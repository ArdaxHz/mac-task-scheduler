name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode | sort -V | tail -5
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_P12=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASS="ci-build-$(date +%s)"

          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_P12"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"

          security import "$CERT_P12" \
            -k "$KEYCHAIN" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASS" "$KEYCHAIN"

          echo "Installed identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

          rm -f "$CERT_P12"

      - name: Prepare export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/__TEAM_ID__/$APPLE_TEAM_ID/" ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project MacTaskScheduler.xcodeproj \
            -scheme MacTaskScheduler \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/MacTaskScheduler.xcarchive \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/MacTaskScheduler.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          echo "Exported contents:"
          ls -la "$RUNNER_TEMP/export/"

          echo "Verifying signature..."
          codesign --verify --verbose=2 "$RUNNER_TEMP/export/Mac Task Scheduler.app"

          echo "Entitlements:"
          codesign -d --entitlements - "$RUNNER_TEMP/export/Mac Task Scheduler.app"

      - name: Create DMG
        run: |
          xattr -cr "$RUNNER_TEMP/export/Mac Task Scheduler.app"

          hdiutil create -volname "Mac Task Scheduler" \
            -srcfolder "$RUNNER_TEMP/export" \
            -ov -format UDZO \
            "$RUNNER_TEMP/MacTaskScheduler.dmg"

      - name: Notarize DMG
        timeout-minutes: 45
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Submitting for notarization..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/MacTaskScheduler.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json 2>&1) || true

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)

          if [ -z "$SUBMISSION_ID" ]; then
            echo "Failed to get submission ID. Output:"
            echo "$SUBMIT_OUTPUT"
            exit 1
          fi

          echo "Submission ID: $SUBMISSION_ID"
          echo "Waiting for notarization to complete..."

          for i in $(seq 1 80); do
            sleep 30
            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1) || continue

            STATUS=$(echo "$STATUS_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "Attempt $i: status=$STATUS"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted!"
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "Notarization failed with status: $STATUS"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
              exit 1
            fi
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization timed out (status: $STATUS)"
            exit 1
          fi

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$RUNNER_TEMP/MacTaskScheduler.dmg"

          echo "Verifying staple..."
          xcrun stapler validate "$RUNNER_TEMP/MacTaskScheduler.dmg"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')

          {
            echo "**Version:** ${{ github.ref_name }}"
            echo ""
            echo "**Install:** Download the DMG, open it, and drag the app to your Applications folder."
            echo "Signed and notarized by Apple Developer ID."
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "$PREV_TAG".."${{ github.ref_name }}"
              echo ""
              echo ""
              echo "**Full diff:** [\`$PREV_TAG\`..\`${{ github.ref_name }}\`](https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }})"
            else
              git log --pretty=format:"- %s" "${{ github.ref_name }}" | head -20
            fi
          } > $RUNNER_TEMP/release-body.md

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Mac Task Scheduler ${{ github.ref_name }}"
          body_path: ${{ runner.temp }}/release-body.md
          files: |
            ${{ runner.temp }}/MacTaskScheduler.dmg
          make_latest: true
